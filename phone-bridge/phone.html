<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#050706" />
    <title>Phone Mirror Mode</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #050706;
        --panel: #0b0f0d;
        --panel-2: #101613;
        --line: rgba(0, 255, 136, 0.22);
        --line-soft: rgba(255, 255, 255, 0.08);
        --text: #eef8f2;
        --muted: #7f9088;
        --accent: #00ff88;
        --danger: #ff4d5c;
        --bar-height: 82px;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        margin: 0;
        background:
          radial-gradient(circle at 18% 0%, rgba(0, 255, 136, 0.1), transparent 28rem),
          linear-gradient(180deg, #050706 0%, #070a09 100%);
        color: var(--text);
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        letter-spacing: 0;
      }

      button {
        border: 0;
        color: inherit;
        font: inherit;
      }

      .app {
        display: grid;
        grid-template-rows: auto 1fr auto;
        min-height: 100dvh;
        padding: env(safe-area-inset-top) 14px env(safe-area-inset-bottom);
      }

      .topbar {
        position: sticky;
        top: 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 18px 2px 14px;
        background: linear-gradient(180deg, rgba(5, 7, 6, 0.96), rgba(5, 7, 6, 0.72) 78%, transparent);
        backdrop-filter: blur(16px);
      }

      .title {
        min-width: 0;
      }

      h1 {
        margin: 0;
        font-size: 19px;
        line-height: 1.05;
        font-weight: 720;
      }

      .subtitle {
        margin-top: 5px;
        color: var(--muted);
        font-size: 12px;
        font-variant-numeric: tabular-nums;
      }

      .status {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        flex: 0 0 auto;
        min-height: 34px;
        padding: 0 11px;
        border: 1px solid var(--line-soft);
        border-radius: 999px;
        background: rgba(11, 15, 13, 0.76);
        color: var(--muted);
        font-size: 12px;
      }

      .dot {
        width: 9px;
        height: 9px;
        border-radius: 999px;
        background: var(--danger);
      }

      .status.connected .dot {
        background: var(--accent);
        animation: pulse 1.8s ease-in-out infinite;
      }

      .feed {
        display: flex;
        flex-direction: column;
        gap: 12px;
        min-height: 0;
        overflow-y: auto;
        padding: 12px 0 calc(var(--bar-height) + 20px);
        scroll-behavior: smooth;
      }

      .empty {
        display: grid;
        place-items: center;
        min-height: 58dvh;
        color: var(--muted);
        text-align: center;
        font-size: 14px;
        line-height: 1.55;
      }

      .card {
        position: relative;
        padding: 14px;
        border: 1px solid var(--line-soft);
        border-radius: 8px;
        background:
          linear-gradient(180deg, rgba(16, 22, 19, 0.96), rgba(9, 13, 11, 0.98)),
          var(--panel);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05);
        animation: rise 240ms cubic-bezier(0.16, 1, 0.3, 1) both;
      }

      .card.latest {
        border-color: var(--line);
      }

      .meta {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 10px;
        color: var(--muted);
        font-size: 11px;
        font-variant-numeric: tabular-nums;
      }

      .badge {
        display: none;
        padding: 4px 8px;
        border: 1px solid rgba(0, 255, 136, 0.28);
        border-radius: 999px;
        color: var(--accent);
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
      }

      .card.latest .badge {
        display: inline-block;
      }

      .content {
        white-space: pre-wrap;
        overflow-wrap: anywhere;
        font-size: 15px;
        line-height: 1.5;
      }

      .actions {
        position: fixed;
        right: 14px;
        bottom: calc(14px + env(safe-area-inset-bottom));
        left: 14px;
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 9px;
        min-height: 56px;
        padding: 8px;
        border: 1px solid var(--line-soft);
        border-radius: 8px;
        background: rgba(8, 12, 10, 0.88);
        backdrop-filter: blur(18px);
        box-shadow: 0 16px 42px rgba(0, 0, 0, 0.42);
      }

      .action {
        min-width: 0;
        min-height: 42px;
        border-radius: 6px;
        background: var(--panel-2);
        color: var(--text);
        font-size: 13px;
        font-weight: 700;
        transition:
          transform 160ms cubic-bezier(0.16, 1, 0.3, 1),
          border-color 160ms cubic-bezier(0.16, 1, 0.3, 1),
          background 160ms cubic-bezier(0.16, 1, 0.3, 1);
      }

      .action:active {
        transform: scale(0.98) translateY(1px);
      }

      .action.primary {
        background: var(--accent);
        color: #00150b;
      }

      @keyframes pulse {
        0%,
        100% {
          box-shadow: 0 0 0 0 rgba(0, 255, 136, 0.36);
        }
        50% {
          box-shadow: 0 0 0 7px rgba(0, 255, 136, 0);
        }
      }

      @keyframes rise {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div class="title">
          <h1>Phone Mirror Mode</h1>
          <div class="subtitle" id="subtitle">Waiting for bridge</div>
        </div>
        <div class="status" id="status">
          <span class="dot" aria-hidden="true"></span>
          <span id="statusText">Offline</span>
        </div>
      </header>

      <section class="feed" id="feed" aria-live="polite">
        <div class="empty" id="empty">AI responses will appear here as Natively writes them.</div>
      </section>

      <nav class="actions" aria-label="Message actions">
        <button class="action" id="clearButton" type="button">Clear</button>
        <button class="action primary" id="copyButton" type="button">Copy</button>
        <button class="action" id="scrollButton" type="button">Scroll</button>
      </nav>
    </main>

    <script>
      const feed = document.getElementById("feed");
      const empty = document.getElementById("empty");
      const status = document.getElementById("status");
      const statusText = document.getElementById("statusText");
      const subtitle = document.getElementById("subtitle");
      const clearButton = document.getElementById("clearButton");
      const copyButton = document.getElementById("copyButton");
      const scrollButton = document.getElementById("scrollButton");

      const messages = [];
      let socket;
      let wakeLock;
      let reconnectTimer;

      function setConnected(isConnected) {
        status.classList.toggle("connected", isConnected);
        statusText.textContent = isConnected ? "Connected" : "Offline";
        subtitle.textContent = isConnected ? "Live mirror active" : "Reconnecting";
      }

      function formatTime(value) {
        const date = value ? new Date(value) : new Date();
        if (Number.isNaN(date.getTime())) {
          return new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" });
        }
        return date.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" });
      }

      function scrollToLatest() {
        feed.scrollTo({ top: feed.scrollHeight, behavior: "smooth" });
      }

      function render() {
        empty.style.display = messages.length ? "none" : "grid";
        feed.querySelectorAll(".card").forEach((card) => card.remove());

        messages.forEach((message, index) => {
          const card = document.createElement("article");
          card.className = `card${index === messages.length - 1 ? " latest" : ""}`;

          const meta = document.createElement("div");
          meta.className = "meta";

          const time = document.createElement("span");
          time.textContent = formatTime(message.createdAt);

          const badge = document.createElement("span");
          badge.className = "badge";
          badge.textContent = "Latest";

          const content = document.createElement("div");
          content.className = "content";
          content.textContent = message.content;

          meta.append(time, badge);
          card.append(meta, content);
          feed.appendChild(card);
        });

        scrollToLatest();
      }

      function connect() {
        clearTimeout(reconnectTimer);
        const protocol = window.location.protocol === "https:" ? "wss:" : "ws:";
        socket = new WebSocket(`${protocol}//${window.location.host}`);

        socket.addEventListener("open", () => setConnected(true));
        socket.addEventListener("close", () => {
          setConnected(false);
          reconnectTimer = setTimeout(connect, 1200);
        });
        socket.addEventListener("error", () => {
          setConnected(false);
          socket.close();
        });
        socket.addEventListener("message", (event) => {
          const payload = JSON.parse(event.data);
          if (payload.type !== "message" || !payload.message) {
            return;
          }

          messages.push(payload.message);
          render();

          if ("vibrate" in navigator) {
            navigator.vibrate(18);
          }
        });
      }

      async function requestWakeLock() {
        if (!("wakeLock" in navigator)) {
          return;
        }

        try {
          wakeLock = await navigator.wakeLock.request("screen");
          wakeLock.addEventListener("release", () => {
            wakeLock = null;
          });
        } catch (error) {
          wakeLock = null;
        }
      }

      clearButton.addEventListener("click", () => {
        messages.length = 0;
        render();
      });

      copyButton.addEventListener("click", async () => {
        const text = messages.map((message) => message.content).join("\n\n");
        if (!text) {
          return;
        }
        await navigator.clipboard.writeText(text);
        copyButton.textContent = "Copied";
        setTimeout(() => {
          copyButton.textContent = "Copy";
        }, 900);
      });

      scrollButton.addEventListener("click", scrollToLatest);

      document.addEventListener("visibilitychange", () => {
        if (document.visibilityState === "visible") {
          requestWakeLock();
        }
      });

      requestWakeLock();
      connect();
    </script>
  </body>
</html>
