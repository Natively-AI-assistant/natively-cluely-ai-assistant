name: Unit & Integration Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  native-module-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: native-module

      - name: Run native module tests
        working-directory: native-module
        run: cargo test --no-default-features

      - name: Run native module checks
        working-directory: native-module
        run: cargo clippy --no-default-features -- -D warnings

  test-coverage:
    runs-on: ubuntu-latest
    needs: native-module-tests
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npx vitest run --coverage

      - name: Check coverage thresholds
        run: |
          node -e "
            const fs = require('fs');
            const coverage = JSON.parse(fs.readFileSync('./coverage/coverage.json', 'utf8'));
            
            // Define our per-directory thresholds from vitest.config.ts
            const thresholds = {
              'src/utils/**': { lines: 90, functions: 90, branches: 90, statements: 90 },
              'src/hooks/**': { lines: 80, functions: 80, branches: 80, statements: 80 },
              'src/components/**': { lines: 70, functions: 70, branches: 70, statements: 70 },
              'src/services/**': { lines: 80, functions: 80, branches: 80, statements: 80 },
              'electron/**': { lines: 60, functions: 60, branches: 60, statements: 60 }
            };
            
            // Check each threshold
            let failed = false;
            for (const [pattern, threshold] of Object.entries(thresholds)) {
              const prefix = pattern.replace('/**', '');
              const files = Object.keys(coverage).filter(file => 
                file.startsWith(prefix)
              );
              
              for (const file of files) {
                const fileCoverage = coverage[file];
                if (fileCoverage.lines < threshold.lines ||
                    fileCoverage.functions < threshold.functions ||
                    fileCoverage.branches < threshold.branches ||
                    fileCoverage.statements < threshold.statements) {
                  console.error('Coverage threshold failed for ' + file);
                  console.error('   Lines: ' + fileCoverage.lines + '/' + threshold.lines);
                  console.error('   Functions: ' + fileCoverage.functions + '/' + threshold.functions);
                  console.error('   Branches: ' + fileCoverage.branches + '/' + threshold.branches);
                  console.error('   Statements: ' + fileCoverage.statements + '/' + threshold.statements);
                  failed = true;
                }
              }
            }
            
            if (failed) {
              console.warn('⚠ Coverage thresholds not met — see warnings above');
              console.warn('⚠ PR will NOT be blocked, but coverage could be improved');
            } else {
              console.log('All coverage thresholds passed');
            }
          "

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage/*.json
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
